<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Crop & Merge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #d4ff6e;
      --accent-dark: #a8cc50;
      --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: -0.02em; }
    .tagline { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 18px; font-size: 0.82rem; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
    .panel { display: none; } .panel.active { display: block; }
    .upload-zone { border: 1px dashed var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; cursor: pointer; background: var(--surface); transition: border-color .2s; margin-bottom: 1rem; }
    .upload-zone:hover { border-color: var(--accent); }
    .upload-zone input { display: none; }
    .upload-zone svg { width: 32px; height: 32px; stroke: var(--muted); margin-bottom: 8px; }
    .upload-zone p { font-size: 0.8rem; color: var(--muted); }
    .canvas-wrap { position: relative; display: inline-block; cursor: crosshair; user-select: none; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: #222; }
    canvas { display: block; max-width: 100%; }
    .selection { position: absolute; border: 2px solid var(--accent); box-shadow: 0 0 0 1px rgba(0,0,0,.5); pointer-events: none; }
    .selection::before, .selection::after { content: ''; position: absolute; background: rgba(212,255,110,.15); }
    .selection::before { top: 0; bottom: 0; left: 33.33%; right: 33.33%; border-left: 1px solid rgba(212,255,110,.3); border-right: 1px solid rgba(212,255,110,.3); }
    .selection::after { left: 0; right: 0; top: 33.33%; bottom: 33.33%; border-top: 1px solid rgba(212,255,110,.3); border-bottom: 1px solid rgba(212,255,110,.3); }
    .handle { position: absolute; width: 11px; height: 11px; background: var(--accent); border: 2px solid #000; border-radius: 3px; pointer-events: all; cursor: nwse-resize; }
    .row { display: flex; gap: 1.25rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .col { flex: 1; min-width: 240px; }
    .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .slider-row label { font-size: 0.78rem; color: var(--muted); min-width: 54px; }
    .slider-row span { font-size: 0.78rem; color: var(--text); min-width: 36px; text-align: right; }
    input[type=range] { flex: 1; accent-color: var(--accent); }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 0.8rem; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--surface); color: var(--text); transition: all .15s; font-family: inherit; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:active { transform: scale(.97); }
    .btn.primary { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #0f0f0f; }
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
    .merge-preview-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: #222; min-height: 120px; display: flex; align-items: center; justify-content: center; }
    .empty-slot { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 0.78rem; }
    .empty-slot svg { width: 24px; height: 24px; stroke: var(--muted); display: block; margin: 0 auto 6px; }
    .orientation-btns { display: flex; gap: 6px; margin-bottom: 0.75rem; }
    .orientation-btn { padding: 6px 12px; font-size: 0.78rem; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: none; color: var(--muted); font-family: inherit; transition: all .15s; }
    .orientation-btn.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }
    .output-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: #222; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; }
    .output-wrap canvas { max-width: 100%; display: block; }
    .container { max-width: 820px; margin: 0 auto; }
  </style>
</head>
<body>
<div class="container">
  <h1>✂ Image Crop & Merge</h1>
  <p class="tagline">Crop and combine images instantly — no uploads, runs in your browser</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('crop')">Crop</button>
    <button class="tab" onclick="switchTab('merge')">Merge</button>
  </div>

  <!-- CROP -->
  <div class="panel active" id="panel-crop">
    <div class="row">
      <div class="col">
        <div class="label">Upload image</div>
        <label class="upload-zone">
          <input type="file" accept="image/*" id="crop-input" onchange="loadCropImage(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <p>Click to upload an image</p>
        </label>
      </div>
      <div class="col" id="crop-options" style="display:none">
        <div class="label">Crop region (sliders or drag)</div>
        <div class="slider-row"><label>X offset</label><input type="range" id="cx" min="0" max="90" value="10" oninput="updateCropFromSliders()"><span id="cx-v">10%</span></div>
        <div class="slider-row"><label>Y offset</label><input type="range" id="cy" min="0" max="90" value="10" oninput="updateCropFromSliders()"><span id="cy-v">10%</span></div>
        <div class="slider-row"><label>Width</label><input type="range" id="cw" min="5" max="100" value="80" oninput="updateCropFromSliders()"><span id="cw-v">80%</span></div>
        <div class="slider-row"><label>Height</label><input type="range" id="ch" min="5" max="100" value="80" oninput="updateCropFromSliders()"><span id="ch-v">80%</span></div>
        <div class="btns">
          <button class="btn primary" onclick="doCrop()">✂ Crop</button>
          <button class="btn" onclick="resetCrop()">↺ Reset</button>
        </div>
      </div>
    </div>
    <div id="crop-canvas-area" style="display:none">
      <div class="label" style="margin-bottom:8px">Drag the selection to adjust crop area</div>
      <div style="overflow:auto">
        <div class="canvas-wrap" id="crop-wrap">
          <canvas id="crop-canvas"></canvas>
          <div class="selection" id="sel"></div>
          <div class="handle" id="handle-tl" style="top:-5px;left:-5px"></div>
          <div class="handle" id="handle-tr" style="top:-5px;right:-5px;cursor:nesw-resize"></div>
          <div class="handle" id="handle-bl" style="bottom:-5px;left:-5px;cursor:nesw-resize"></div>
          <div class="handle" id="handle-br" style="bottom:-5px;right:-5px"></div>
        </div>
      </div>
    </div>
    <div id="crop-result-area" style="display:none;margin-top:1rem">
      <div class="divider"></div>
      <div class="label">Cropped result</div>
      <div class="output-wrap"><canvas id="crop-result"></canvas></div>
      <div class="btns">
        <button class="btn primary" onclick="downloadCrop()">↓ Download PNG</button>
        <button class="btn" onclick="sendToMerge('A')">→ Send to Merge A</button>
        <button class="btn" onclick="sendToMerge('B')">→ Send to Merge B</button>
      </div>
    </div>
  </div>

  <!-- MERGE -->
  <div class="panel" id="panel-merge">
    <div style="margin-bottom:.75rem">
      <div class="label">Layout</div>
      <div class="orientation-btns">
        <button class="orientation-btn active" id="ob-h" onclick="setOrientation('h')">⬛⬛ Side by side</button>
        <button class="orientation-btn" id="ob-v" onclick="setOrientation('v')">⬛<br>⬛ Stacked</button>
      </div>
      <div class="slider-row" style="max-width:320px"><label>Gap (px)</label><input type="range" id="gap-slider" min="0" max="40" value="0" step="1" oninput="updateMergePreview();document.getElementById('gap-v').textContent=this.value+'px'"><span id="gap-v">0px</span></div>
      <div class="slider-row" style="max-width:320px"><label>Scale B</label><input type="range" id="scale-slider" min="20" max="200" value="100" step="1" oninput="updateMergePreview();document.getElementById('scale-v').textContent=this.value+'%'"><span id="scale-v">100%</span></div>
    </div>
    <div class="row">
      <div class="col">
        <div class="label">Image A</div>
        <div class="merge-preview-wrap" id="slot-a-wrap"><div class="empty-slot"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>No image</div></div>
        <label class="btn" style="margin-top:8px;display:inline-flex;cursor:pointer"><input type="file" accept="image/*" style="display:none" onchange="loadMergeImage('A',this)">↑ Upload A</label>
      </div>
      <div class="col">
        <div class="label">Image B</div>
        <div class="merge-preview-wrap" id="slot-b-wrap"><div class="empty-slot"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>No image</div></div>
        <label class="btn" style="margin-top:8px;display:inline-flex;cursor:pointer"><input type="file" accept="image/*" style="display:none" onchange="loadMergeImage('B',this)">↑ Upload B</label>
      </div>
    </div>
    <div id="merge-output-area" style="display:none">
      <div class="divider"></div>
      <div class="label">Merged result</div>
      <div class="output-wrap"><canvas id="merge-result"></canvas></div>
      <div class="btns" style="margin-top:.75rem">
        <button class="btn primary" onclick="downloadMerge()">↓ Download PNG</button>
      </div>
    </div>
  </div>
</div>
<script>
let cropImg=null,cropCanvas=document.getElementById('crop-canvas'),cropCtx=cropCanvas.getContext('2d');
let displayScale=1,sel={x:0,y:0,w:0,h:0},dragging=false,dragMode=null,dragStart={};
let mergeImgA=null,mergeImgB=null,mergeOrientation='h';

function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['crop','merge'][i]===t));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',['crop','merge'][i]===t));
}
function loadCropImage(inp){
  const f=inp.files[0];if(!f)return;
  const img=new Image();
  img.onload=()=>{
    cropImg=img;const MAX=600;displayScale=img.width>MAX?MAX/img.width:1;
    cropCanvas.width=Math.round(img.width*displayScale);cropCanvas.height=Math.round(img.height*displayScale);
    cropCtx.drawImage(img,0,0,cropCanvas.width,cropCanvas.height);
    sel={x:Math.round(cropCanvas.width*.1),y:Math.round(cropCanvas.height*.1),w:Math.round(cropCanvas.width*.8),h:Math.round(cropCanvas.height*.8)};
    updateSel();document.getElementById('crop-canvas-area').style.display='';document.getElementById('crop-options').style.display='';document.getElementById('crop-result-area').style.display='none';
  };img.src=URL.createObjectURL(f);
}
function updateSel(){
  const s=document.getElementById('sel');
  s.style.left=sel.x+'px';s.style.top=sel.y+'px';s.style.width=sel.w+'px';s.style.height=sel.h+'px';
  document.getElementById('handle-tl').style.cssText+=';left:'+(sel.x-5)+'px;top:'+(sel.y-5)+'px';
  document.getElementById('handle-tr').style.cssText+=';left:'+(sel.x+sel.w-5)+'px;top:'+(sel.y-5)+'px';
  document.getElementById('handle-bl').style.cssText+=';left:'+(sel.x-5)+'px;top:'+(sel.y+sel.h-5)+'px';
  document.getElementById('handle-br').style.cssText+=';left:'+(sel.x+sel.w-5)+'px;top:'+(sel.y+sel.h-5)+'px';
  const px=v=>Math.round(v/cropCanvas.width*100),py=v=>Math.round(v/cropCanvas.height*100);
  ['cx','cy','cw','ch'].forEach((id,i)=>{
    const vals=[px(sel.x),py(sel.y),px(sel.w),py(sel.h)];
    document.getElementById(id).value=vals[i];document.getElementById(id+'-v').textContent=vals[i]+'%';
  });
}
function updateCropFromSliders(){
  if(!cropCanvas.width)return;
  sel.x=Math.round(parseInt(document.getElementById('cx').value)/100*cropCanvas.width);
  sel.y=Math.round(parseInt(document.getElementById('cy').value)/100*cropCanvas.height);
  sel.w=Math.min(Math.round(parseInt(document.getElementById('cw').value)/100*cropCanvas.width),cropCanvas.width-sel.x);
  sel.h=Math.min(Math.round(parseInt(document.getElementById('ch').value)/100*cropCanvas.height),cropCanvas.height-sel.y);
  ['cx','cy','cw','ch'].forEach(id=>document.getElementById(id+'-v').textContent=document.getElementById(id).value+'%');
  updateSel();
}
const wrap=document.getElementById('crop-wrap');
wrap.addEventListener('mousedown',startDrag);wrap.addEventListener('mousemove',onDrag);wrap.addEventListener('mouseup',endDrag);wrap.addEventListener('mouseleave',endDrag);
wrap.addEventListener('touchstart',e=>startDrag(e.touches[0]),{passive:true});
wrap.addEventListener('touchmove',e=>{e.preventDefault();onDrag(e.touches[0]);},{passive:false});
wrap.addEventListener('touchend',endDrag);
['tl','tr','bl','br'].forEach(id=>{
  document.getElementById('handle-'+id).addEventListener('mousedown',e=>{e.stopPropagation();dragMode='resize-'+id;dragStart={mx:e.clientX,my:e.clientY,...sel};dragging=true;});
  document.getElementById('handle-'+id).addEventListener('touchstart',e=>{e.stopPropagation();const t=e.touches[0];dragMode='resize-'+id;dragStart={mx:t.clientX,my:t.clientY,...sel};dragging=true;},{passive:true});
});
function getRelPos(e){const r=wrap.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function startDrag(e){
  const{x,y}=getRelPos(e);
  if(x>=sel.x&&x<=sel.x+sel.w&&y>=sel.y&&y<=sel.y+sel.h){dragMode='move';dragging=true;dragStart={mx:x,my:y,...sel};}
  else{dragMode='new';dragging=true;dragStart={mx:x,my:y};sel={x,y,w:0,h:0};}
}
function onDrag(e){
  if(!dragging)return;const{x,y}=getRelPos(e);const CW=cropCanvas.width,CH=cropCanvas.height;
  if(dragMode==='move'){sel.x=Math.max(0,Math.min(CW-sel.w,dragStart.x+(x-dragStart.mx)));sel.y=Math.max(0,Math.min(CH-sel.h,dragStart.y+(y-dragStart.my)));}
  else if(dragMode==='new'){const x0=Math.min(dragStart.mx,x),x1=Math.max(dragStart.mx,x),y0=Math.min(dragStart.my,y),y1=Math.max(dragStart.my,y);sel={x:Math.max(0,x0),y:Math.max(0,y0),w:Math.min(CW,x1)-Math.max(0,x0),h:Math.min(CH,y1)-Math.max(0,y0)};}
  else if(dragMode){const id=dragMode.replace('resize-',''),{x:sx,y:sy,w:sw,h:sh,mx:ox,my:oy}=dragStart,dx=x-ox,dy=y-oy;
    if(id==='br'){sel.w=Math.max(10,Math.min(CW-sx,sw+dx));sel.h=Math.max(10,Math.min(CH-sy,sh+dy));}
    else if(id==='bl'){const nx=Math.min(sx+sw-10,Math.max(0,sx+dx));sel.x=nx;sel.w=sx+sw-nx;sel.h=Math.max(10,Math.min(CH-sy,sh+dy));}
    else if(id==='tr'){sel.w=Math.max(10,Math.min(CW-sx,sw+dx));const ny=Math.min(sy+sh-10,Math.max(0,sy+dy));sel.y=ny;sel.h=sy+sh-ny;}
    else if(id==='tl'){const nx=Math.min(sx+sw-10,Math.max(0,sx+dx)),ny=Math.min(sy+sh-10,Math.max(0,sy+dy));sel.x=nx;sel.y=ny;sel.w=sx+sw-nx;sel.h=sy+sh-ny;}
  }
  updateSel();
}
function endDrag(){dragging=false;dragMode=null;}
function resetCrop(){if(!cropImg)return;sel={x:Math.round(cropCanvas.width*.1),y:Math.round(cropCanvas.height*.1),w:Math.round(cropCanvas.width*.8),h:Math.round(cropCanvas.height*.8)};updateSel();}
function doCrop(){
  if(!cropImg||sel.w<2||sel.h<2)return;
  const sx=sel.x/displayScale,sy=sel.y/displayScale,sw=sel.w/displayScale,sh=sel.h/displayScale;
  const rc=document.getElementById('crop-result');rc.width=Math.round(sw);rc.height=Math.round(sh);
  rc.getContext('2d').drawImage(cropImg,sx,sy,sw,sh,0,0,sw,sh);
  document.getElementById('crop-result-area').style.display='';
}
function downloadCrop(){const c=document.getElementById('crop-result');const a=document.createElement('a');a.download='cropped.png';a.href=c.toDataURL();a.click();}
function sendToMerge(slot){
  const c=document.getElementById('crop-result');const img=new Image();
  img.onload=()=>{if(slot==='A'){mergeImgA=img;showMergeThumb('A',img);}else{mergeImgB=img;showMergeThumb('B',img);}updateMergePreview();};
  img.src=c.toDataURL();switchTab('merge');
}
function loadMergeImage(slot,inp){
  const f=inp.files[0];if(!f)return;const img=new Image();
  img.onload=()=>{if(slot==='A'){mergeImgA=img;showMergeThumb('A',img);}else{mergeImgB=img;showMergeThumb('B',img);}updateMergePreview();};
  img.src=URL.createObjectURL(f);
}
function showMergeThumb(slot,img){
  const w=document.getElementById('slot-'+slot.toLowerCase()+'-wrap');w.innerHTML='';
  const c=document.createElement('canvas'),MAX=200,sc=img.width>MAX?MAX/img.width:1;
  c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.style.maxWidth='100%';
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);w.appendChild(c);
}
function setOrientation(o){
  mergeOrientation=o;
  document.getElementById('ob-h').classList.toggle('active',o==='h');
  document.getElementById('ob-v').classList.toggle('active',o==='v');
  updateMergePreview();
}
function updateMergePreview(){
  if(!mergeImgA&&!mergeImgB){document.getElementById('merge-output-area').style.display='none';return;}
  const gap=parseInt(document.getElementById('gap-slider').value)||0,scaleB=parseInt(document.getElementById('scale-slider').value)/100;
  const a=mergeImgA,b=mergeImgB;
  const aW=a?a.width:0,aH=a?a.height:0,bW=b?Math.round(b.width*scaleB):0,bH=b?Math.round(b.height*scaleB):0;
  let W,H;
  if(mergeOrientation==='h'){W=(aW||0)+(bW?gap+bW:0);H=Math.max(aH||0,bH||0);}
  else{W=Math.max(aW||0,bW||0);H=(aH||0)+(bH?gap+bH:0);}
  if(!W||!H)return;
  const rc=document.getElementById('merge-result'),MAX=600,sc=W>MAX?MAX/W:1;
  rc.width=Math.round(W*sc);rc.height=Math.round(H*sc);
  const ctx=rc.getContext('2d');ctx.clearRect(0,0,rc.width,rc.height);
  if(a)ctx.drawImage(a,0,0,Math.round(aW*sc),Math.round(aH*sc));
  const ox=mergeOrientation==='h'?Math.round((aW+gap)*sc):0,oy=mergeOrientation==='v'?Math.round((aH+gap)*sc):0;
  if(b)ctx.drawImage(b,ox,oy,Math.round(bW*sc),Math.round(bH*sc));
  document.getElementById('merge-output-area').style.display='';
}
function downloadMerge(){
  if(!mergeImgA&&!mergeImgB)return;
  const gap=parseInt(document.getElementById('gap-slider').value)||0,scaleB=parseInt(document.getElementById('scale-slider').value)/100;
  const a=mergeImgA,b=mergeImgB;
  const aW=a?a.width:0,aH=a?a.height:0,bW=b?Math.round(b.width*scaleB):0,bH=b?Math.round(b.height*scaleB):0;
  let W,H;
  if(mergeOrientation==='h'){W=(aW||0)+(bW?gap+bW:0);H=Math.max(aH||0,bH||0);}
  else{W=Math.max(aW||0,bW||0);H=(aH||0)+(bH?gap+bH:0);}
  const c=document.createElement('canvas');c.width=W;c.height=H;const ctx=c.getContext('2d');
  if(a)ctx.drawImage(a,0,0,aW,aH);
  const ox=mergeOrientation==='h'?aW+gap:0,oy=mergeOrientation==='v'?aH+gap:0;
  if(b)ctx.drawImage(b,ox,oy,bW,bH);
  const link=document.createElement('a');link.download='merged.png';link.href=c.toDataURL('image/png');link.click();
}
</script>
</body>
</html>
