<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Crop & Merge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #d4ff6e;
      --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
    header h1 { font-size: 0.95rem; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; }
    .header-tools { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; font-size: 0.78rem; border: 1px solid var(--border); border-radius: 7px; cursor: pointer; background: var(--surface); color: var(--text); transition: all .15s; font-family: inherit; white-space: nowrap; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:active { transform: scale(.97); }
    .btn.primary { background: var(--accent); color: #0f0f0f; border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover { opacity: .85; color: #0f0f0f; }
    .btn.danger:hover { border-color: #ff6b6b; color: #ff6b6b; }
    .tabs { display: flex; gap: 2px; }
    .tab { padding: 5px 12px; font-size: 0.78rem; cursor: pointer; border: 1px solid transparent; background: none; color: var(--muted); border-radius: 6px; font-family: inherit; transition: all .15s; }
    .tab.active { background: var(--surface); border-color: var(--border); color: var(--text); }
    .workspace { flex: 1; position: relative; overflow: hidden; }
    canvas#main { width: 100%; height: 100%; display: block; cursor: default; background: #111; }
    .sidebar { position: absolute; top: 10px; right: 10px; width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar-title { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .prop-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .prop-label { font-size: 0.75rem; color: var(--muted); }
    .prop-val { font-size: 0.75rem; color: var(--text); font-variant-numeric: tabular-nums; }
    .layer-item { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; font-size: 0.75rem; transition: all .1s; }
    .layer-item.active { border-color: var(--accent); background: rgba(212,255,110,.06); color: var(--accent); }
    .layer-item:hover:not(.active) { background: var(--surface2); }
    .layer-thumb { width: 28px; height: 28px; object-fit: cover; border-radius: 4px; background: #333; flex-shrink: 0; }
    .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.7); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 0.72rem; color: var(--muted); white-space: nowrap; pointer-events: none; }
    .crop-overlay { position: absolute; top: 10px; left: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; display: flex; flex-direction: column; gap: 8px; min-width: 170px; }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-row label { font-size: 0.72rem; color: var(--muted); min-width: 14px; }
    .slider-row span { font-size: 0.72rem; color: var(--text); min-width: 30px; text-align: right; }
    input[type=range] { flex: 1; accent-color: var(--accent); height: 3px; }
    .upload-zone { border: 1px dashed var(--border); border-radius: 8px; padding: 14px 10px; text-align: center; cursor: pointer; font-size: 0.75rem; color: var(--muted); transition: border-color .2s; }
    .upload-zone:hover { border-color: var(--accent); color: var(--accent); }
    .sep { height: 1px; background: var(--border); }
  </style>
</head>
<body>

<header>
  <h1>✂ Image Crop & Merge</h1>
  <div class="tabs">
    <button class="tab active" id="tab-compose" onclick="setMode('compose')">Compose</button>
    <button class="tab" id="tab-crop" onclick="setMode('crop')">Crop</button>
  </div>
  <div class="header-tools">
    <label class="btn">
      <input type="file" accept="image/*" style="display:none" onchange="addImage(this)"> + Add Image
    </label>
    <button class="btn" onclick="bringForward()">↑ Forward</button>
    <button class="btn" onclick="sendBackward()">↓ Backward</button>
    <button class="btn danger" onclick="deleteSelected()">✕ Delete</button>
    <button class="btn" onclick="clearAll()">Clear All</button>
    <button class="btn primary" onclick="downloadResult()">↓ Download PNG</button>
  </div>
</header>

<div class="workspace">
  <canvas id="main"></canvas>

  <!-- Compose sidebar -->
  <div class="sidebar" id="compose-sidebar">
    <div class="sidebar-title">Layers</div>
    <div id="layer-list" style="display:flex;flex-direction:column;gap:4px;min-height:20px">
      <div style="font-size:0.72rem;color:var(--muted);text-align:center;padding:8px 0">No images yet</div>
    </div>
    <div class="sep"></div>
    <div class="sidebar-title">Selected</div>
    <div id="props">
      <div style="font-size:0.72rem;color:var(--muted)">Nothing selected</div>
    </div>
  </div>

  <!-- Crop overlay -->
  <div class="crop-overlay" id="crop-overlay" style="display:none">
    <div class="sidebar-title">Crop region</div>
    <div class="slider-row"><label>X</label><input type="range" id="cr-x" min="0" max="90" value="10" oninput="syncCropSlider('x',this)"><span id="cr-x-v">10%</span></div>
    <div class="slider-row"><label>Y</label><input type="range" id="cr-y" min="0" max="90" value="10" oninput="syncCropSlider('y',this)"><span id="cr-y-v">10%</span></div>
    <div class="slider-row"><label>W</label><input type="range" id="cr-w" min="5" max="100" value="80" oninput="syncCropSlider('w',this)"><span id="cr-w-v">80%</span></div>
    <div class="slider-row"><label>H</label><input type="range" id="cr-h" min="5" max="100" value="80" oninput="syncCropSlider('h',this)"><span id="cr-h-v">80%</span></div>
    <div class="sep"></div>
    <button class="btn primary" onclick="applyCrop()" style="width:100%;justify-content:center">✂ Apply Crop</button>
    <button class="btn" onclick="resetCropSel()" style="width:100%;justify-content:center">↺ Reset</button>
    <div style="font-size:0.7rem;color:var(--muted);text-align:center">Select layer first, then crop</div>
  </div>

  <div class="hint" id="hint">Add images to get started</div>
</div>

<script>
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');

let layers = [];
let selected = null;
let mode = 'compose';

let drag = null;
let resizing = null;
let cropSel = {x:10,y:10,w:80,h:80};
let cropDrag = null;

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  draw();
}
window.addEventListener('resize', resize);
resize();

function setMode(m) {
  mode = m;
  document.getElementById('tab-compose').classList.toggle('active', m==='compose');
  document.getElementById('tab-crop').classList.toggle('active', m==='crop');
  document.getElementById('compose-sidebar').style.display = m==='compose'?'':'none';
  document.getElementById('crop-overlay').style.display = m==='crop'?'':'none';
  updateHint();
  draw();
}

function updateHint() {
  const h = document.getElementById('hint');
  if(layers.length===0){h.textContent='Add images to get started';h.style.display='';return;}
  if(mode==='compose'){
    h.textContent = selected ? 'Drag to move · Corner handles to resize' : 'Click an image to select it';
  } else {
    h.textContent = selected ? 'Drag crop handles · Apply to crop' : 'Select a layer first';
  }
  h.style.display='';
}

function addImage(inp) {
  const f = inp.files[0]; if(!f) return;
  const img = new Image();
  img.onload = () => {
    const maxW = canvas.width * 0.6, maxH = canvas.height * 0.6;
    let w = img.naturalWidth, h = img.naturalHeight;
    if(w > maxW){ h = h*(maxW/w); w = maxW; }
    if(h > maxH){ w = w*(maxH/h); h = maxH; }
    const layer = {
      img, w: Math.round(w), h: Math.round(h),
      x: Math.round((canvas.width - w)/2 + (layers.length*20)%100),
      y: Math.round((canvas.height - h)/2 + (layers.length*20)%100),
      name: f.name.replace(/\.[^.]+$/,'').slice(0,18),
      thumb: makeThumb(img)
    };
    layers.push(layer);
    selected = layer;
    draw();
    updateLayerList();
    updateProps();
    updateHint();
  };
  img.src = URL.createObjectURL(f);
  inp.value='';
}

function makeThumb(img) {
  const c = document.createElement('canvas'); c.width=28; c.height=28;
  const x = c.getContext('2d');
  const s = Math.min(28/img.naturalWidth, 28/img.naturalHeight);
  const w = img.naturalWidth*s, h = img.naturalHeight*s;
  x.drawImage(img,(28-w)/2,(28-h)/2,w,h);
  return c.toDataURL();
}

const HANDLE = 9;

function getHandles(l) {
  return [
    {id:'tl', x:l.x,         y:l.y},
    {id:'tr', x:l.x+l.w,     y:l.y},
    {id:'bl', x:l.x,         y:l.y+l.h},
    {id:'br', x:l.x+l.w,     y:l.y+l.h},
    {id:'tc', x:l.x+l.w/2,   y:l.y},
    {id:'bc', x:l.x+l.w/2,   y:l.y+l.h},
    {id:'lc', x:l.x,         y:l.y+l.h/2},
    {id:'rc', x:l.x+l.w,     y:l.y+l.h/2},
  ];
}

function hitHandle(l, mx, my) {
  for(const h of getHandles(l)) {
    if(Math.abs(mx-h.x)<=HANDLE && Math.abs(my-h.y)<=HANDLE) return h.id;
  }
  return null;
}

function hitLayer(mx, my) {
  for(let i=layers.length-1;i>=0;i--) {
    const l=layers[i];
    if(mx>=l.x&&mx<=l.x+l.w&&my>=l.y&&my<=l.y+l.h) return l;
  }
  return null;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#111'; ctx.fillRect(0,0,canvas.width,canvas.height);

  for(const l of layers) {
    ctx.drawImage(l.img, l.x, l.y, l.w, l.h);
  }

  if(mode==='compose' && selected) {
    const l = selected;
    ctx.strokeStyle='#d4ff6e'; ctx.lineWidth=1.5;
    ctx.strokeRect(l.x, l.y, l.w, l.h);
    for(const h of getHandles(l)) {
      ctx.fillStyle='#d4ff6e';
      ctx.fillRect(h.x-HANDLE/2, h.y-HANDLE/2, HANDLE, HANDLE);
      ctx.strokeStyle='#0f0f0f'; ctx.lineWidth=1;
      ctx.strokeRect(h.x-HANDLE/2, h.y-HANDLE/2, HANDLE, HANDLE);
    }
  }

  if(mode==='crop' && selected) {
    const l = selected;
    const rx = l.x + cropSel.x/100*l.w;
    const ry = l.y + cropSel.y/100*l.h;
    const rw = cropSel.w/100*l.w;
    const rh = cropSel.h/100*l.h;

    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(l.x,l.y,l.w,l.h);
    ctx.clearRect(rx,ry,rw,rh);
    ctx.drawImage(l.img,
      cropSel.x/100*l.img.naturalWidth, cropSel.y/100*l.img.naturalHeight,
      cropSel.w/100*l.img.naturalWidth, cropSel.h/100*l.img.naturalHeight,
      rx, ry, rw, rh);

    ctx.strokeStyle='#d4ff6e'; ctx.lineWidth=1.5; ctx.setLineDash([]);
    ctx.strokeRect(rx,ry,rw,rh);

    const handles = [
      {id:'tl',x:rx,y:ry},{id:'tr',x:rx+rw,y:ry},
      {id:'bl',x:rx,y:ry+rh},{id:'br',x:rx+rw,y:ry+rh}
    ];
    for(const h of handles) {
      ctx.fillStyle='#d4ff6e';
      ctx.fillRect(h.x-5,h.y-5,10,10);
    }

    ctx.strokeStyle='rgba(212,255,110,0.3)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(rx+rw/3,ry); ctx.lineTo(rx+rw/3,ry+rh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx+rw*2/3,ry); ctx.lineTo(rx+rw*2/3,ry+rh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx,ry+rh/3); ctx.lineTo(rx+rw,ry+rh/3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx,ry+rh*2/3); ctx.lineTo(rx+rw,ry+rh*2/3); ctx.stroke();
  }
}

canvas.addEventListener('mousedown', e => {
  const {offsetX:mx, offsetY:my} = e;
  if(mode==='compose') {
    if(selected) {
      const hid = hitHandle(selected, mx, my);
      if(hid) {
        resizing = {hid, ox:mx, oy:my, l:{...selected}};
        return;
      }
    }
    const hit = hitLayer(mx,my);
    if(hit) {
      selected = hit;
      drag = {ox:mx-hit.x, oy:my-hit.y};
      layers.splice(layers.indexOf(hit),1); layers.push(hit);
      updateLayerList(); updateProps(); draw();
    } else {
      selected=null; updateProps(); draw();
    }
    updateHint();
  } else if(mode==='crop' && selected) {
    const l=selected;
    const rx=l.x+cropSel.x/100*l.w, ry=l.y+cropSel.y/100*l.h;
    const rw=cropSel.w/100*l.w, rh=cropSel.h/100*l.h;
    const handles=[{id:'tl',x:rx,y:ry},{id:'tr',x:rx+rw,y:ry},{id:'bl',x:rx,y:ry+rh},{id:'br',x:rx+rw,y:ry+rh}];
    for(const h of handles) {
      if(Math.abs(mx-h.x)<=8&&Math.abs(my-h.y)<=8) {
        cropDrag={id:h.id,ox:mx,oy:my,snap:{...cropSel}};
        return;
      }
    }
    if(mx>=rx&&mx<=rx+rw&&my>=ry&&my<=ry+rh) {
      cropDrag={id:'move',ox:mx,oy:my,snap:{...cropSel}};
    } else if(mx>=l.x&&mx<=l.x+l.w&&my>=l.y&&my<=l.y+l.h) {
      const px=(mx-l.x)/l.w*100, py=(my-l.y)/l.h*100;
      cropSel={x:Math.round(px),y:Math.round(py),w:1,h:1};
      cropDrag={id:'new',ox:mx,oy:my,startPx:px,startPy:py};
      syncSlidersFromSel();
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const {offsetX:mx, offsetY:my} = e;
  if(drag && mode==='compose') {
    selected.x = mx - drag.ox;
    selected.y = my - drag.oy;
    draw(); updateProps();
  } else if(resizing && mode==='compose') {
    const {hid,ox,oy,l} = resizing;
    const dx=mx-ox, dy=my-oy;
    let {x,y,w,h}=l;
    if(hid==='br'){w=Math.max(20,w+dx);h=Math.max(20,h+dy);}
    else if(hid==='bl'){const nw=Math.max(20,w-dx);x=x+w-nw;w=nw;h=Math.max(20,h+dy);}
    else if(hid==='tr'){w=Math.max(20,w+dx);const nh=Math.max(20,h-dy);y=y+h-nh;h=nh;}
    else if(hid==='tl'){const nw=Math.max(20,w-dx);x=x+w-nw;w=nw;const nh=Math.max(20,h-dy);y=y+h-nh;h=nh;}
    else if(hid==='rc'){w=Math.max(20,w+dx);}
    else if(hid==='lc'){const nw=Math.max(20,w-dx);x=x+w-nw;w=nw;}
    else if(hid==='bc'){h=Math.max(20,h+dy);}
    else if(hid==='tc'){const nh=Math.max(20,h-dy);y=y+h-nh;h=nh;}
    selected.x=x;selected.y=y;selected.w=w;selected.h=h;
    draw(); updateProps();
  } else if(cropDrag && mode==='crop' && selected) {
    const l=selected;
    if(cropDrag.id==='move') {
      const dx=(mx-cropDrag.ox)/l.w*100, dy=(my-cropDrag.oy)/l.h*100;
      cropSel.x=Math.max(0,Math.min(100-cropSel.w,cropDrag.snap.x+dx));
      cropSel.y=Math.max(0,Math.min(100-cropSel.h,cropDrag.snap.y+dy));
    } else if(cropDrag.id==='new') {
      const px=(mx-l.x)/l.w*100, py=(my-l.y)/l.h*100;
      const x0=Math.min(cropDrag.startPx,px),x1=Math.max(cropDrag.startPx,px);
      const y0=Math.min(cropDrag.startPy,py),y1=Math.max(cropDrag.startPy,py);
      cropSel={x:Math.max(0,x0),y:Math.max(0,y0),w:Math.min(100,x1-x0),h:Math.min(100,y1-y0)};
    } else {
      const {id,ox,oy,snap}=cropDrag;
      const dx=(mx-ox)/l.w*100, dy=(my-oy)/l.h*100;
      if(id==='br'){cropSel.w=Math.max(2,Math.min(100-snap.x,snap.w+dx));cropSel.h=Math.max(2,Math.min(100-snap.y,snap.h+dy));}
      else if(id==='bl'){const nw=Math.max(2,snap.w-dx);cropSel.x=Math.max(0,snap.x+snap.w-nw);cropSel.w=nw;cropSel.h=Math.max(2,Math.min(100-snap.y,snap.h+dy));}
      else if(id==='tr'){cropSel.w=Math.max(2,Math.min(100-snap.x,snap.w+dx));const nh=Math.max(2,snap.h-dy);cropSel.y=Math.max(0,snap.y+snap.h-nh);cropSel.h=nh;}
      else if(id==='tl'){const nw=Math.max(2,snap.w-dx);cropSel.x=Math.max(0,snap.x+snap.w-nw);cropSel.w=nw;const nh=Math.max(2,snap.h-dy);cropSel.y=Math.max(0,snap.y+snap.h-nh);cropSel.h=nh;}
    }
    cropSel.x=Math.round(cropSel.x); cropSel.y=Math.round(cropSel.y);
    cropSel.w=Math.round(cropSel.w); cropSel.h=Math.round(cropSel.h);
    syncSlidersFromSel();
    draw();
  }

  if(mode==='compose') {
    let cur='default';
    if(selected){
      const hid=hitHandle(selected,mx,my);
      if(hid) cur=(['tl','br'].includes(hid)?'nwse-resize':['tr','bl'].includes(hid)?'nesw-resize':['tc','bc'].includes(hid)?'ns-resize':'ew-resize');
      else if(hitLayer(mx,my)===selected) cur='move';
    } else if(hitLayer(mx,my)) cur='pointer';
    canvas.style.cursor=cur;
  } else {
    canvas.style.cursor='crosshair';
  }
});

canvas.addEventListener('mouseup', ()=>{ drag=null; resizing=null; cropDrag=null; });
canvas.addEventListener('mouseleave', ()=>{ drag=null; resizing=null; cropDrag=null; });

function syncCropSlider(dim,el) {
  const v=parseInt(el.value);
  cropSel[dim]=v;
  document.getElementById('cr-'+dim+'-v').textContent=v+'%';
  draw();
}

function syncSlidersFromSel() {
  ['x','y','w','h'].forEach(d=>{
    document.getElementById('cr-'+d).value=Math.round(cropSel[d]);
    document.getElementById('cr-'+d+'-v').textContent=Math.round(cropSel[d])+'%';
  });
}

function resetCropSel() {
  cropSel={x:10,y:10,w:80,h:80}; syncSlidersFromSel(); draw();
}

function applyCrop() {
  if(!selected) return;
  const l=selected;
  const c=document.createElement('canvas');
  const sw=cropSel.w/100*l.img.naturalWidth, sh=cropSel.h/100*l.img.naturalHeight;
  c.width=Math.round(sw); c.height=Math.round(sh);
  c.getContext('2d').drawImage(l.img,cropSel.x/100*l.img.naturalWidth,cropSel.y/100*l.img.naturalHeight,sw,sh,0,0,sw,sh);
  const newImg=new Image();
  newImg.onload=()=>{
    l.img=newImg;
    const aspect=sh/sw;
    l.h=Math.round(l.w*aspect);
    l.thumb=makeThumb(newImg);
    cropSel={x:10,y:10,w:80,h:80};
    syncSlidersFromSel();
    updateLayerList(); draw();
  };
  newImg.src=c.toDataURL();
}

function updateLayerList() {
  const el=document.getElementById('layer-list');
  if(layers.length===0){el.innerHTML='<div style="font-size:0.72rem;color:var(--muted);text-align:center;padding:8px 0">No images yet</div>';return;}
  el.innerHTML='';
  [...layers].reverse().forEach(l=>{
    const d=document.createElement('div');
    d.className='layer-item'+(l===selected?' active':'');
    d.innerHTML=`<img class="layer-thumb" src="${l.thumb}"><span class="layer-name">${l.name}</span>`;
    d.onclick=()=>{selected=l;layers.splice(layers.indexOf(l),1);layers.push(l);draw();updateLayerList();updateProps();updateHint();};
    el.appendChild(d);
  });
}

function updateProps() {
  const el=document.getElementById('props');
  if(!selected){el.innerHTML='<div style="font-size:0.72rem;color:var(--muted)">Nothing selected</div>';return;}
  const l=selected;
  el.innerHTML=`
    <div class="prop-row"><span class="prop-label">X</span><span class="prop-val">${Math.round(l.x)}px</span></div>
    <div class="prop-row"><span class="prop-label">Y</span><span class="prop-val">${Math.round(l.y)}px</span></div>
    <div class="prop-row"><span class="prop-label">W</span><span class="prop-val">${Math.round(l.w)}px</span></div>
    <div class="prop-row"><span class="prop-label">H</span><span class="prop-val">${Math.round(l.h)}px</span></div>
  `;
}

function bringForward() {
  if(!selected)return;
  const i=layers.indexOf(selected);
  if(i<layers.length-1){layers.splice(i,1);layers.splice(i+1,0,selected);}
  draw(); updateLayerList();
}

function sendBackward() {
  if(!selected)return;
  const i=layers.indexOf(selected);
  if(i>0){layers.splice(i,1);layers.splice(i-1,0,selected);}
  draw(); updateLayerList();
}

function deleteSelected() {
  if(!selected)return;
  layers.splice(layers.indexOf(selected),1);
  selected=null; draw(); updateLayerList(); updateProps(); updateHint();
}

function clearAll() {
  layers=[]; selected=null; draw(); updateLayerList(); updateProps(); updateHint();
}

function downloadResult() {
  const c=document.createElement('canvas');
  c.width=canvas.width; c.height=canvas.height;
  const x=c.getContext('2d');
  x.fillStyle='#111'; x.fillRect(0,0,c.width,c.height);
  for(const l of layers) x.drawImage(l.img,l.x,l.y,l.w,l.h);
  const a=document.createElement('a'); a.download='merged.png'; a.href=c.toDataURL('image/png'); a.click();
}
</script>
</body>
</html>
